# Dataset configuration for gender prediction

# Paths (relative to project or config location)
data_dir: "../../reasoning/data/gender"
stats_csv: "../../reasoning/data/gender/sakhno_stats_dataset_renamed.csv"
test_ids_csv: "../../reasoning/data/gender/test_ids.csv"

# Column names
id_col: "customer_id"
target_col: "gender"

# Feature categories for organized display
transaction_frequency_features:
  - "Average transactions per day"
  - "Count of all transactions"
  - "Count of expences transactions"

temporal_pattern_features: []

financial_metric_features:
  - "Sum amount at all transactions"
  - "Sum of expences"
  - "Mean amount at all transactions"
  - "Median amount at all transactions"
  - "Median of income"
  - "Std of expences"

spending_pattern_features: []


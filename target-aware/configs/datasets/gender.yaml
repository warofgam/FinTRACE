task: gender
data_dir: ../../data/gender
stats_csv: sakhno_stats_dataset_renamed.csv
test_ids_csv: test_ids.csv
id_col: customer_id
target_col: gender
rules_file: rules/gender.txt

# Gender: 0 = Female, 1 = Male. Model outputs Verdict: Male or Female
verdict_output: [Male, Female]
verdict_to_label: {Male: 1, Female: 0}  # for metrics: 0/1
pos_label: 1  # Male for F1
labels_metric: [0, 1]
label_names: ["0 (F)", "1 (M)"]

# Feature order for profile (column names in stats CSV)
feature_order:
  - "Average transactions per day"
  - "Count of all transactions"
  - "Count of expences transactions"
  - "Sum amount at all transactions"
  - "Sum of expences"
  - "Mean amount at all transactions"
  - "Median amount at all transactions"
  - "Median of income"
  - "Std of expences"
  - 'Median of expences at category "Cosmetics stores"'
